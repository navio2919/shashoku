<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>社食利用料金 集計アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">20日締め・Googleスプレッドシート連携</p>
        <h1>社食利用料金 集計</h1>
        <p>メニューを選ぶだけで金額が入り、全員分を同じスプレッドシートへ保存します。</p>
      </div>
      <button id="syncButton" class="secondary">最新データ取得</button>
    </header>

    <section class="card">
      <h2>利用登録</h2>
      <form id="mealForm" class="form-grid">
        <label>
          利用日
          <input type="date" id="date" required />
        </label>

        <label>
          利用者
          <select id="user" required></select>
        </label>

        <label>
          メニュー
          <select id="menu" required></select>
        </label>

        <label>
          金額
          <input type="number" id="amount" min="0" step="1" required />
        </label>

        <label>
          備考
          <input type="text" id="memo" placeholder="例：大盛り、現金調整など" />
        </label>

        <button type="submit">登録する</button>
      </form>

      <div class="menu-buttons" id="menuButtons"></div>
      <p id="status" class="status"></p>
    </section>

    <script src="app.js"></script>
</body>
</html>

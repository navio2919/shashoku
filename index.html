<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>社食利用料金 集計アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">20日締め対応</p>
        <h1>社食利用料金 集計</h1>
        <p>利用者10人向けのかんたん入力・集計画面です。</p>
      </div>
      <button id="downloadCsv" class="secondary">CSV出力</button>
    </header>

    <section class="card">
      <h2>利用登録</h2>
      <form id="mealForm" class="form-grid">
        <label>
          利用日
          <input type="date" id="date" required />
        </label>
        <label>
          利用者
          <select id="user" required></select>
        </label>
        <label>
          金額
          <input type="number" id="amount" min="0" step="1" placeholder="例：480" required />
        </label>
        <label>
          備考
          <input type="text" id="memo" placeholder="例：定食A" />
        </label>
        <button type="submit">追加する</button>
      </form>
    </section>

    <section class="summary-grid">
      <div class="card">
        <h2>締め月別 合計</h2>
        <div id="monthSummary"></div>
      </div>
      <div class="card">
        <h2>利用者別 合計</h2>
        <div id="userSummary"></div>
      </div>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>利用明細</h2>
        <button id="clearData" class="danger">デモデータを削除</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>利用日</th>
              <th>締め月</th>
              <th>利用者</th>
              <th>金額</th>
              <th>備考</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="entryTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
